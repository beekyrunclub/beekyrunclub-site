<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yeni Şifre — Beeky Run Club</title>
<meta name="description" content="Beeky Run Club yeni şifre belirleme." />
<link rel="icon" type="image/jpeg" href="logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .auth-wrap {
    min-height: 70vh; display: flex; align-items: center; justify-content: center;
    padding: 48px 20px;
  }
  .auth-card { width: 100%; max-width: 420px; }
  .auth-card .section-head { margin-bottom: 24px; }
  .auth-alt { margin-top: 18px; font-size: 14px; opacity: .85; }
  .auth-alt a { font-weight: 600; text-decoration: underline; }
  #resetWaiting { text-align: center; padding: 2rem 0; opacity: 0.7; font-size: 0.95rem; }

  /* Form alanları açık zemin için */
  .auth-card .field label { color: var(--blue-ink); opacity: 0.85; }
  .auth-card .field input,
  .auth-card .field select,
  .auth-card .field textarea {
    border-bottom-color: var(--line);
    color: var(--blue-ink);
  }
  .auth-card .field input::placeholder,
  .auth-card .field textarea::placeholder {
    color: rgba(10, 10, 10, 0.35);
  }
  .auth-card .field input:focus,
  .auth-card .field select:focus,
  .auth-card .field textarea:focus {
    border-bottom-color: var(--blue);
  }
  .auth-card .btn {
    background: var(--blue);
    color: var(--cream);
    border-color: var(--blue);
  }
  .auth-card .btn:hover {
    background: transparent;
    color: var(--blue);
  }
  .auth-card .form-status.ok {
    background: rgba(30, 63, 204, 0.08);
    border: 1px solid var(--blue);
    color: var(--blue);
  }
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <a href="index.html" class="logo-mark">
    <img src="logo.jpeg" alt="Beeky Run Club logo" />
    <span>BEEKY</span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
    <li><a href="antrenmanlar.html">Antrenmanlar</a></li>
    <li><a href="bulusma.html">Buluşma</a></li>
    <li><a href="takvim.html">Takvim</a></li>
    <li><a href="galeri.html">Galeri</a></li>
    <li><a href="sponsorlar.html">Sponsor</a></li>
    <li><a href="index.html#kayit">Kayıt</a></li>
    <li><a href="index.html#iletisim">İletişim</a></li>
  </ul>
  <button class="mobile-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ============ YENİ ŞİFRE ============ -->
<main class="auth-wrap" id="sifreSifirlaPage">
  <div class="auth-card">

    <!-- Oturum doğrulanırken gösterilir -->
    <div id="resetWaiting">Oturum doğrulanıyor...</div>

    <!-- Doğrulama başarılıysa form gösterilir -->
    <div id="resetFormWrap" hidden>
      <div class="section-head">
        <span class="section-num">YENİ ŞİFRE</span>
        <h2 class="section-title">Şifreni <em>güncelle.</em></h2>
      </div>

      <form class="form" id="passwordResetForm" novalidate>
        <div class="field full">
          <label for="newPass">Yeni Şifre</label>
          <input id="newPass" name="password" type="password" required minlength="6"
            placeholder="En az 6 karakter" autocomplete="new-password" />
        </div>
        <div class="field full">
          <label for="newPassConfirm">Şifre Tekrar</label>
          <input id="newPassConfirm" name="password_confirm" type="password" required minlength="6"
            placeholder="Şifreni tekrar gir" autocomplete="new-password" />
        </div>
        <button class="btn" type="submit">ŞİFREYİ GÜNCELLE →</button>
        <div class="form-status" id="resetStatus"></div>
      </form>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
