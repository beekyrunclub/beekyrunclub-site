<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giriş Yap — Beeky Run Club</title>
<meta name="description" content="Beeky Run Club üye girişi." />
<link rel="icon" type="image/jpeg" href="logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .auth-wrap{
    min-height:70vh; display:flex; align-items:center; justify-content:center;
    padding:48px 20px;
  }
  .auth-card{
    width:100%; max-width:420px;
  }
  .auth-card .section-head{ margin-bottom:24px; }
  .auth-alt {
    margin-top: 18px; font-size: 14px; opacity: .85;
  }
  .auth-alt a { font-weight: 600; text-decoration: underline; }

  /* Form alanları açık zemin için */
  .auth-card .field label { color: var(--blue-ink); opacity: 0.85; }
  .auth-card .field input,
  .auth-card .field select,
  .auth-card .field textarea {
    border-bottom-color: var(--line);
    color: var(--blue-ink);
  }
  .auth-card .field input::placeholder,
  .auth-card .field textarea::placeholder {
    color: rgba(10, 10, 10, 0.35);
  }
  .auth-card .field input:focus,
  .auth-card .field select:focus,
  .auth-card .field textarea:focus {
    border-bottom-color: var(--blue);
  }
  .auth-card .btn {
    background: var(--blue);
    color: var(--cream);
    border-color: var(--blue);
  }
  .auth-card .btn:hover {
    background: transparent;
    color: var(--blue);
  }
  .auth-card .form-status.ok {
    background: rgba(30, 63, 204, 0.08);
    border: 1px solid var(--blue);
    color: var(--blue);
  }
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <a href="index.html" class="logo-mark">
    <img src="logo.jpeg" alt="Beeky Run Club logo" />
    <span>BEEKY</span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
    <li><a href="antrenmanlar.html">Antrenmanlar</a></li>
    <li><a href="bulusma.html">Buluşma</a></li>
    <li><a href="takvim.html">Takvim</a></li>
    <li><a href="galeri.html">Galeri</a></li>
    <li><a href="sponsorlar.html">Sponsor</a></li>
    <li><a href="index.html#kayit">Kayıt</a></li>
    <li><a href="index.html#iletisim">İletişim</a></li>
  </ul>
  <button class="mobile-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ============ GİRİŞ ============ -->
<main class="auth-wrap">
  <div class="auth-card">
    <div class="section-head">
      <span class="section-num">ÜYE GİRİŞİ</span>
      <h2 class="section-title">Tekrar <em>hoş geldin.</em></h2>
    </div>

    <form class="form" id="loginForm" novalidate>
      <div class="field full">
        <label for="liMail">E-posta</label>
        <input id="liMail" name="email" type="email" required placeholder="ornek@mail.com" autocomplete="email" />
      </div>
      <div class="field full">
        <label for="liPass">Şifre</label>
        <input id="liPass" name="password" type="password" required placeholder="••••••" autocomplete="current-password" />
      </div>
      <button class="btn" type="submit">GİRİŞ YAP →</button>
      <div class="form-status" id="loginStatus"></div>
    </form>

    <p class="auth-alt">
      Henüz hesabın yok mu? <a href="index.html#kayit">Aramıza katıl →</a>
    </p>
    <p class="auth-alt" style="margin-top:8px;">
      <a href="sifremi-unuttum.html">Şifremi unuttum</a>
    </p>
    <p class="auth-alt" style="margin-top:8px;">
      <a href="#" id="resendToggle">Onay e-postası gelmedi mi?</a>
    </p>

    <div id="resendWrap" hidden style="margin-top:16px;">
      <div class="field full">
        <label for="resendMail">E-posta adresin</label>
        <input id="resendMail" type="email" placeholder="ornek@mail.com" autocomplete="email" />
      </div>
      <button class="btn" id="resendBtn" style="margin-top:12px;">TEKRAR GÖNDER →</button>
      <div class="form-status" id="resendStatus" style="margin-top:10px;"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
  document.getElementById("resendToggle").addEventListener("click", function (e) {
    e.preventDefault();
    var wrap = document.getElementById("resendWrap");
    wrap.hidden = !wrap.hidden;
    if (!wrap.hidden) document.getElementById("resendMail").focus();
  });

  document.getElementById("resendBtn").addEventListener("click", async function () {
    var email  = document.getElementById("resendMail").value.trim();
    var status = document.getElementById("resendStatus");
    var btn    = this;

    if (!email) {
      status.textContent = "E-posta adresini gir.";
      status.className = "form-status err show";
      return;
    }

    btn.disabled = true;
    btn.textContent = "GÖNDERİLİYOR...";
    status.className = "form-status";

    const { error } = await sb.auth.resend({ type: "signup", email });

    btn.disabled = false;
    btn.textContent = "TEKRAR GÖNDER →";

    if (error) {
      status.textContent = "Hata: " + error.message;
      status.className = "form-status err show";
    } else {
      status.textContent = "Onay e-postası gönderildi. Gelen kutunu kontrol et.";
      status.className = "form-status ok show";
    }
  });
</script>
</body>
</html>
