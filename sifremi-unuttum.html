<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Şifremi Unuttum — Beeky Run Club</title>
<meta name="description" content="Beeky Run Club şifre sıfırlama." />
<link rel="icon" type="image/jpeg" href="logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .auth-wrap {
    min-height: 70vh; display: flex; align-items: center; justify-content: center;
    padding: 48px 20px;
  }
  .auth-card { width: 100%; max-width: 420px; }
  .auth-card .section-head { margin-bottom: 24px; }
  .auth-alt { margin-top: 18px; font-size: 14px; opacity: .85; }
  .auth-alt a { font-weight: 600; text-decoration: underline; }

  /* Form alanları açık zemin için */
  .auth-card .field label { color: var(--blue-ink); opacity: 0.85; }
  .auth-card .field input,
  .auth-card .field select,
  .auth-card .field textarea {
    border-bottom-color: var(--line);
    color: var(--blue-ink);
  }
  .auth-card .field input::placeholder,
  .auth-card .field textarea::placeholder {
    color: rgba(10, 10, 10, 0.35);
  }
  .auth-card .field input:focus,
  .auth-card .field select:focus,
  .auth-card .field textarea:focus {
    border-bottom-color: var(--blue);
  }
  .auth-card .btn {
    background: var(--blue);
    color: var(--cream);
    border-color: var(--blue);
  }
  .auth-card .btn:hover {
    background: transparent;
    color: var(--blue);
  }
  .auth-card .form-status.ok {
    background: rgba(30, 63, 204, 0.08);
    border: 1px solid var(--blue);
    color: var(--blue);
  }
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <a href="index.html" class="logo-mark">
    <img src="logo.jpeg" alt="Beeky Run Club logo" />
    <span>BEEKY</span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
    <li><a href="antrenmanlar.html">Antrenmanlar</a></li>
    <li><a href="bulusma.html">Buluşma</a></li>
    <li><a href="takvim.html">Takvim</a></li>
    <li><a href="galeri.html">Galeri</a></li>
    <li><a href="sponsorlar.html">Sponsor</a></li>
    <li><a href="index.html#kayit">Kayıt</a></li>
    <li><a href="index.html#iletisim">İletişim</a></li>
  </ul>
  <button class="mobile-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ============ ŞİFREMİ UNUTTUM ============ -->
<main class="auth-wrap">
  <div class="auth-card">
    <div class="section-head">
      <span class="section-num">ŞİFRE SIFIRLAMA</span>
      <h2 class="section-title">Şifreni <em>sıfırla.</em></h2>
    </div>

    <p style="font-size:1rem; line-height:1.6; margin-bottom:1.75rem; opacity:0.8;">
      Kayıtlı e-posta adresini gir. Şifre sıfırlama bağlantısı gönderelim.
    </p>

    <form class="form" id="forgotForm" novalidate>
      <div class="field full">
        <label for="forgotMail">E-posta</label>
        <input id="forgotMail" name="email" type="email" required placeholder="ornek@mail.com" autocomplete="email" />
      </div>
      <button class="btn" type="submit">BAĞLANTI GÖNDER →</button>
      <div class="form-status" id="forgotStatus"></div>
    </form>

    <p class="auth-alt">
      <a href="giris.html">← Giriş sayfasına dön</a>
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
