<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profilim — Beeky Run Club</title>
<meta name="description" content="Beeky Run Club üye profili." />
<link rel="icon" type="image/jpeg" href="logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .profil-wrap{ padding:48px 20px 64px; }
  .profil-card{
    max-width:560px; margin:0 auto;
  }
  .profil-card .section-head{ margin-bottom:24px; }
  .profil-list{ margin-top:8px; }
  .profil-row{
    display:flex; justify-content:space-between; gap:16px;
    padding:14px 0; border-bottom:1px dashed rgba(0,0,0,.18);
  }
  .profil-row .k{ opacity:.7; font-size:14px; }
  .profil-row .v{ font-weight:600; text-align:right; word-break:break-word; }
  .profil-actions{ margin-top:28px; }
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <a href="index.html" class="logo-mark">
    <img src="logo.jpeg" alt="Beeky Run Club logo" />
    <span>BEEKY</span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
    <li><a href="antrenmanlar.html">Antrenmanlar</a></li>
    <li><a href="bulusma.html">Buluşma</a></li>
    <li><a href="takvim.html">Takvim</a></li>
    <li><a href="galeri.html">Galeri</a></li>
    <li><a href="sponsorlar.html">Sponsor</a></li>
    <li><a href="index.html#kayit">Kayıt</a></li>
    <li><a href="index.html#iletisim">İletişim</a></li>
  </ul>
  <button class="mobile-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ============ PROFİL ============ -->
<main class="profil-wrap" id="profilPage">
  <div class="profil-card">
    <div class="section-head">
      <span class="section-num">PROFİLİM</span>
      <h2 class="section-title">Hesap <em>bilgilerin.</em></h2>
    </div>

    <div class="profil-list">
      <div class="profil-row"><span class="k">E-posta</span><span class="v" id="pEmail">—</span></div>
      <div class="profil-row"><span class="k">Ad Soyad</span><span class="v" id="pAd">—</span></div>
      <div class="profil-row"><span class="k">Telefon</span><span class="v" id="pTel">—</span></div>
      <div class="profil-row"><span class="k">Yaş Aralığı</span><span class="v" id="pYas">—</span></div>
      <div class="profil-row"><span class="k">Tempo</span><span class="v" id="pTempo">—</span></div>
    </div>

    <div class="profil-actions">
      <a class="btn" href="index.html">Ana sayfaya dön</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
