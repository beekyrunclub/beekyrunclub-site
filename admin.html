<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yarış Yönetimi — Beeky Run Club</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .admin-layout {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 4rem;
    align-items: start;
    padding: 2rem;
  }

  /* ---- Form (açık zemin) ---- */
  .admin-form { max-width: 100%; grid-template-columns: 1fr; }
  .admin-form .field label { color: var(--blue-ink); opacity: 0.85; }
  .admin-form .field input,
  .admin-form .field select,
  .admin-form .field textarea {
    border-bottom-color: var(--line);
    color: var(--blue-ink);
  }
  .admin-form .field input::placeholder { color: rgba(10,10,10,.35); }
  .admin-form .field input:focus { border-bottom-color: var(--blue); }
  .admin-form .btn {
    background: var(--blue); color: var(--cream); border-color: var(--blue); margin-top: 0;
  }
  .admin-form .btn:hover { background: transparent; color: var(--blue); }
  .admin-form .form-status.ok {
    background: rgba(30,63,204,.08); border: 1px solid var(--blue); color: var(--blue);
  }
  .admin-form-actions {
    display: flex; gap: 1rem; margin-top: 1.75rem;
    padding-top: 1.5rem; border-top: 1px solid var(--line); flex-wrap: wrap;
  }
  .field-hint {
    font-size: 0.72rem; opacity: 0.55; margin-top: 0.35rem;
  }

  /* ---- Yarış listesi ---- */
  .race-admin-card {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--line);
  }
  .race-admin-card:first-child { border-top: 1px solid var(--line); }
  .race-admin-card.past { opacity: 0.45; }

  .race-admin-name {
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.05rem;
    line-height: 1.1;
    margin-bottom: 0.25rem;
  }
  .race-admin-meta {
    font-size: 0.78rem;
    color: var(--blue-ink);
    opacity: 0.6;
    letter-spacing: 0.04em;
    margin-bottom: 0.5rem;
  }
  .race-admin-dists { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .dist-tag {
    background: var(--blue);
    color: var(--cream);
    font-family: var(--display);
    font-weight: 700;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    padding: 0.18rem 0.5rem;
    border-radius: 2px;
  }

  .race-admin-actions { display: flex; gap: 0.5rem; flex-shrink: 0; margin-top: 2px; }

  .btn-ghost.sm {
    padding: 0.4rem 0.85rem;
    font-size: 0.78rem;
  }
  .btn-del {
    background: transparent;
    border: 1.5px solid #bf3b3b;
    color: #bf3b3b;
    padding: 0.4rem 0.85rem;
    font-family: var(--display);
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-del:hover { background: #bf3b3b; color: var(--cream); }
  .btn-del:disabled { opacity: 0.4; cursor: not-allowed; }

  .admin-empty {
    border: 1.5px dashed var(--line);
    padding: 2.5rem 1.5rem;
    text-align: center;
    opacity: 0.6;
    font-size: 0.95rem;
  }

  @media (max-width: 1000px) {
    .admin-layout { grid-template-columns: 1fr; gap: 3rem; }
  }
  @media (max-width: 600px) {
    .admin-layout { padding: 1.25rem; }
    .race-admin-card { flex-wrap: wrap; }
    .race-admin-actions { width: 100%; }
  }
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <a href="index.html" class="logo-mark">
    <img src="logo.jpeg" alt="Beeky Run Club logo" />
    <span>BEEKY</span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
    <li><a href="antrenmanlar.html">Antrenmanlar</a></li>
    <li><a href="bulusma.html">Buluşma</a></li>
    <li><a href="takvim.html">Takvim</a></li>
    <li><a href="galeri.html">Galeri</a></li>
    <li><a href="sponsorlar.html">Sponsor</a></li>
    <li><a href="index.html#kayit">Kayıt</a></li>
    <li><a href="index.html#iletisim">İletişim</a></li>
  </ul>
  <button class="mobile-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ============ ADMIN ============ -->
<main id="adminPage">
  <section class="subpage-section">
    <div class="container">

      <a class="back-link" href="profil.html">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Profil
      </a>

      <div class="admin-layout">

        <!-- ====== SOL: FORM ====== -->
        <div class="admin-form-col">
          <div class="section-head">
            <span class="section-num">YÖNETİM</span>
            <h2 class="section-title" id="raceFormTitle">Yeni Yarış <em>ekle.</em></h2>
          </div>

          <form class="form admin-form" id="raceForm" novalidate>

            <div class="field full">
              <label for="rIsim">Yarış Adı *</label>
              <input id="rIsim" name="isim" type="text" required
                placeholder="Vodafone İstanbul Yarı Maratonu" />
            </div>

            <div class="field full">
              <label for="rTarih">Tarih *</label>
              <input id="rTarih" name="tarih" type="date" required />
            </div>

            <div class="field full">
              <label for="rKonum">Konum</label>
              <input id="rKonum" name="konum" type="text" placeholder="İstanbul" />
            </div>

            <div class="field full">
              <label for="rMesafeler">Mesafeler</label>
              <input id="rMesafeler" name="mesafeler" type="text"
                placeholder="10K, 21K, 42K" />
              <span class="field-hint">Virgülle ayır — örn: 10K, 21K</span>
            </div>

            <div class="field full">
              <label for="rUrl">Kayıt / Bilgi Linki</label>
              <input id="rUrl" name="url" type="url" placeholder="https://..." />
            </div>

            <div class="form-status" id="raceFormStatus"></div>

            <div class="admin-form-actions">
              <button class="btn" type="submit" id="raceSubmitBtn">EKLE →</button>
              <button class="btn-ghost" type="button" id="raceCancelEdit" hidden>İptal</button>
            </div>

          </form>
        </div>

        <!-- ====== SAĞ: LİSTE ====== -->
        <div>
          <div class="section-head">
            <span class="section-num">TÜM YARIŞLAR</span>
            <h2 class="section-title">Takvim <em>listesi.</em></h2>
          </div>
          <div id="adminRaceList">
            <p style="opacity:.6; font-size:.9rem;">Yükleniyor...</p>
          </div>
        </div>

      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
